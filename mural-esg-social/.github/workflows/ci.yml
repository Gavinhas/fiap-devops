# CI quando este diretório é a RAIZ do repositório Git (projeto só mural-esg-social).
# Se o repositório for o monorepo Fiap, o workflow ativo está em Fiap/.github/workflows/mural-esg-social-ci.yml

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  maven:
    name: Maven verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven verify
        run: mvn -B verify

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: maven
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mural-esg-social:ci .
