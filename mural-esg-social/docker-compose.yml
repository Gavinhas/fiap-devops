# Mural ESG Social — ambiente local (app + PostgreSQL)
# Credenciais: defina POSTGRES_* e/ou copie .env.example para .env

services:
  db:
    image: postgres:16-alpine
    container_name: mural-esg-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mural_esg}
      POSTGRES_USER: ${POSTGRES_USER:-mural}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mural}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mural-esg-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-mural_esg}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mural}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-mural}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_SEED_ADMIN_USERNAME: ${APP_SEED_ADMIN_USERNAME:-admin}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin}
      APP_SEED_USER_USERNAME: ${APP_SEED_USER_USERNAME:-usuario}
      APP_SEED_USER_PASSWORD: ${APP_SEED_USER_PASSWORD:-usuario}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
