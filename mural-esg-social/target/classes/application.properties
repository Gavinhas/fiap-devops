spring.application.name=mural-esg-social

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mural_esg}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mural}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mural}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=${SERVER_PORT:8080}
