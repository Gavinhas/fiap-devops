
name: mural-esg-social CI

on:
  push:
    branches: [main, master]
    paths:
      - "mural-esg-social/**"
      - ".github/workflows/mural-esg-social-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "mural-esg-social/**"
      - ".github/workflows/mural-esg-social-ci.yml"

concurrency:
  group: mural-esg-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: mural-esg-social

jobs:
  maven:
    name: Maven verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: mural-esg-social/pom.xml

      - run: mvn -B verify

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: maven
    # O default do workflow usa working-directory: mural-esg-social; aqui o docker build
    # precisa dos paths relativos à raiz do repositório (Dockerfile + context).
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f mural-esg-social/Dockerfile mural-esg-social -t mural-esg-social:ci
